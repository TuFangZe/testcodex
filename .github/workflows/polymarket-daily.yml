name: Polymarket Daily Report

on:
  workflow_dispatch:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"

permissions:
  contents: read

concurrency:
  group: polymarket-daily
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      POLYMARKET_REPORT_TZ: Asia/Shanghai
      POLYMARKET_REPORT_DATE_FORMAT: "%Y-%m-%d"
      GMAIL_TO: fangze.tu@zoxtech.cn,fangzetu@126.com
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate required secrets
        run: |
          python - <<'PY'
          import os, sys
          required = [
              "GMAIL_CLIENT_ID",
              "GMAIL_CLIENT_SECRET",
              "GMAIL_REFRESH_TOKEN",
              "GMAIL_SENDER",
          ]
          missing = [k for k in required if not os.getenv(k)]
          if missing:
              print("Missing GitHub Actions secrets:", ", ".join(missing))
              sys.exit(1)
          if not os.getenv("OPENAI_API_KEY"):
              print("OPENAI_API_KEY is missing; workflow will fall back to template report generation.")
          print("Secrets look complete.")
          PY

      - name: Run Polymarket daily report
        run: |
          python scripts/polymarket_daily.py

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-report-${{ github.run_id }}
          path: |
            outputs/**
            *.md
          if-no-files-found: ignore
